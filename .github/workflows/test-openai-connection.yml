name: Test OpenAI Connection

on:
  workflow_dispatch:

jobs:
  test-openai-connection:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fail clearly when OPENAI_API_KEY is missing
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY repository secret is missing. Add it in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tiny OpenAI structured-output connection test
        run: npm run test:openai:connection | tee openai-connection-summary.json

      - name: Upload safe redacted result summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-connection-summary
          path: openai-connection-summary.json
          if-no-files-found: ignore
